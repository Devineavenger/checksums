# .github/workflows/tests.yml
name: bats tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *' # nightly strict run at 03:00 UTC

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        strict: [false] # default PR/CI run is non-strict
    env:
      CI_PARALLEL: 4
      CI_STRICT_LOGS: ${{ matrix.strict }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg
          # Install bats (bats-core) from package if available, otherwise install bats-core from GitHub
          if apt-cache show bats >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends bats
          else
            # Install bats-core (portable installer)
            git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
            sudo /tmp/bats-core/install.sh /usr/local
            rm -rf /tmp/bats-core
          fi

      - name: Run tests
        run: |
          # Confirm bats is available
          if ! command -v bats >/dev/null 2>&1; then
            echo "bats not found after install; aborting" >&2
            exit 2
          fi
          ./tests/test_matrix.bats

  nightly-strict:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      CI_PARALLEL: 4
      CI_STRICT_LOGS: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg
          if apt-cache show bats >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends bats
          else
            git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
            sudo /tmp/bats-core/install.sh /usr/local
            rm -rf /tmp/bats-core
          fi

      - name: Run strict tests
        run: |
          if ! command -v bats >/dev/null 2>&1; then
            echo "bats not found after install; aborting" >&2
            exit 2
          fi
          ./tests/test_matrix.bats
