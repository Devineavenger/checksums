name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip release commits to avoid redundant CI on make release pushes
    if: "!startsWith(github.event.head_commit.message, 'Release v')"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}
    name: CI (${{ matrix.name }})

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl gnupg jq shellcheck make git parallel

          # Prefer distro package bats-core if available, otherwise install from upstream
          if apt-cache show bats-core >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends bats-core
          elif apt-cache show bats >/dev/null 2>&1; then
            sudo apt-get install -y --no-install-recommends bats
          else
            git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
            sudo /tmp/bats-core/install.sh /usr/local
            rm -rf /tmp/bats-core
          fi

      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash coreutils bats-core shellcheck jq parallel
          # Ensure Homebrew bash and coreutils are first on PATH so GNU
          # tools (md5sum, sha256sum, gstat, etc.) are found before BSD ones
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Run pre-flight checks
        run: make check

      - name: Capture changelog preview
        id: changelog
        continue-on-error: true
        run: |
          preview="$(make changelog 2>/dev/null || true)"
          preview="${preview//'%'/'%25'}"
          preview="${preview//$'\n'/'%0A'}"
          preview="${preview//$'\r'/'%0D'}"
          echo "preview=$preview" >> "$GITHUB_OUTPUT"

      - name: Comment changelog on PR
        if: github.event_name == 'pull_request' && matrix.name == 'linux'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog-preview
          message: |
            ### Changelog Preview
            ${{ steps.changelog.outputs.preview }}
