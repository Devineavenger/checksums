name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats-core shellcheck make jq

      - name: Run pre-flight checks
        run: make check

      - name: Capture changelog preview
        id: changelog
        continue-on-error: true
        run: |
          preview="$(make changelog 2>/dev/null || true)"
          preview="${preview//'%'/'%25'}"
          preview="${preview//$'\n'/'%0A'}"
          preview="${preview//$'\r'/'%0D'}"
          echo "preview=$preview" >> "$GITHUB_OUTPUT"

      - name: Comment changelog on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: changelog-preview
          message: |
            ### 📜 Changelog Preview
            ${{ steps.changelog.outputs.preview }}

  changelog-draft:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats-core shellcheck make jq

      - name: Generate draft changelog
        run: make changelog-draft

      - name: Commit draft changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update docs/CHANGELOG.md with draft entries"
          branch: ${{ github.head_ref }}
          file_pattern: docs/CHANGELOG.md
