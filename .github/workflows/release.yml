name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (optional). If empty, release.sh will determine version from files.'
        required: false
      prerelease:
        description: 'Create prerelease?'
        required: false
        default: 'false'
      draft:
        description: 'Create draft release?'
        required: false
        default: 'false'
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run release script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set FORCE_TAG_UPDATE=1 only if you explicitly want CI to overwrite remote tags
          FORCE_TAG_UPDATE: 0
        run: |
          set -x
          # prefer workflow_dispatch input; fall back to passing nothing (script will error if version missing)
          if [ -n "${{ github.event.inputs.version || '' }}" ]; then
            bash release.sh "${{ github.event.inputs.version }}" $( [ "${{ github.event.inputs.prerelease }}" = "true" ] && echo --prerelease ) $( [ "${{ github.event.inputs.draft }}" = "true" ] && echo --draft )
          else
            bash release.sh
          fi
