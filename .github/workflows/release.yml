name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (optional). If empty, release.sh will determine version from files.'
        required: false
      prerelease:
        description: 'Create prerelease?'
        required: false
        default: 'false'
      draft:
        description: 'Create draft release?'
        required: false
        default: 'false'
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Provide token and default FORCE_TAG_UPDATE here so the script can read them
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_TAG_UPDATE: "0"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl git

      - name: Run release script
        # fail fast and show commands
        run: |
          set -xeuo pipefail

          # Expand workflow inputs into shell variables (safe: evaluated before the run)
          VERSION="${{ github.event.inputs.version || '' }}"
          PRERELEASE="${{ github.event.inputs.prerelease || 'false' }}"
          DRAFT="${{ github.event.inputs.draft || 'false' }}"

          # Build args array
          args=()
          if [ -n "$VERSION" ]; then
            args+=("$VERSION")
          fi
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ "$DRAFT" = "true" ]; then
            args+=(--draft)
          fi

          # Call the canonical script path
          # Use bash explicitly to avoid /bin/sh differences
          bash ./scripts/release.sh "${args[@]}"
