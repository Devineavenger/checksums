# checksums.conf — configuration file for checksums v4.4
#
# Place this file in the root directory you want to scan,
# named "${BASE_NAME}.conf" (default: #####checksums#####.conf).
# Or specify explicitly with --config FILE.
#
# Format: KEY=VALUE (one per line)
# Lines starting with # are comments. Blank lines are ignored.
# Values may be quoted ("value" or 'value') — quotes are stripped.
# CLI arguments always override config settings.

# === Core file naming ===
# Base name for generated files (.md5, .meta, .log).
# Default: #####checksums#####
# BASE_NAME=project_checksums

# Base name for per-directory log files (default: same as BASE_NAME)
# LOG_BASE=mylog

# === Algorithms ===
# Per-file checksum algorithm: md5 (default), sha1, sha224, sha256, sha384, sha512
# Manifest file extension matches the algorithm (.md5, .sha256, etc.)
# Comma-separated for multi-algo: md5,sha256 (writes one manifest per algorithm)
# PER_FILE_ALGO=sha256

# Meta signature algorithm: sha256 (default), md5, or none
# META_SIG_ALGO=sha256

# === Logging ===
# Log format: text (default), json, or csv
# LOG_FORMAT=text

# === Parallelism ===
# Number of parallel hashing jobs (default 1)
# Accepts: integer, "auto" (all cores), or fraction (3/4, 1/2, etc.)
# PARALLEL_JOBS=4

# Number of directories to process in parallel (default 1)
# Accepts: integer, "auto" (all cores), or fraction (3/4, 1/2, etc.)
# PARALLEL_DIRS=auto

# === Batching ===
# Adaptive batching rules: LOW-HIGH:COUNT,>HIGH:COUNT with K/M/G suffixes
# BATCH_RULES=0-10M:20,10M-40M:20,>40M:5

# === Behavior toggles ===
# Force rebuild of all checksums, ignoring manifests
# FORCE_REBUILD=1

# Disable reuse heuristics; force rehash of all files
# NO_REUSE=1

# Dry-run mode (no writes)
# DRY_RUN=1

# Verbose logging
# VERBOSE=1

# Debug logging
# DEBUG=1

# Assume "yes" for all prompts (non-interactive)
# YES=1

# Assume "no" for all prompts
# ASSUME_NO=1

# Live progress reporting (default 1, set to 0 to disable)
# PROGRESS=1

# Minimal mode: write only .md5 manifest, skip .meta/.log/.run.log
# MINIMAL=1

# Quiet mode: suppress all output except errors (-q)
# QUIET=0

# Central manifest store: redirect all sidecar files into this directory
# Uses a mirror tree layout matching the scanned directory structure
# STORE_DIR=/path/to/.checksums

# === First-run verification ===
# Enable first-run bootstrap mode
# FIRST_RUN=1

# First-run action on mismatch: skip, overwrite, or prompt
# FIRST_RUN_CHOICE=prompt

# Keep first-run log after overwrites (audit trail)
# FIRST_RUN_KEEP=1

# === Verification ===
# Enable verify-only audit mode (no writes)
# VERIFY_ONLY=1

# Enable per-directory MD5 verification in planning (default 1)
# VERIFY_MD5_DETAILS=1

# Status/diff mode (read-only)
# STATUS_ONLY=1

# External manifest check: verify files against a manifest file (sha256sum -c compatible)
# Typically used via CLI: -c FILE or --check FILE
# CHECK_FILE=/path/to/manifest.sha256

# === Directory handling ===
# Skip directories with no files (default 1)
# SKIP_EMPTY=1

# Protect root from sidecar files (default 1, set to 0 to allow)
# NO_ROOT_SIDEFILES=1

# Follow symbolic links when scanning (default 0 = don't follow)
# When enabled, symlinks to files are included and symlinked directories are descended
# FOLLOW_SYMLINKS=1

# === File Size ===
# Maximum file size to process (e.g., 10M, 1G, plain number = bytes)
# Files larger than this threshold are skipped
# MAX_SIZE=1G

# Minimum file size to process (e.g., 1K, 100 = 100 bytes)
# Files smaller than this threshold are skipped
# MIN_SIZE=1K

# === Patterns ===
# Exclude patterns: comma-separated basename shell globs for files to skip.
# Each comma-separated entry becomes a separate pattern. Equivalent to
# repeating --exclude / -e on the CLI.
# EXCLUDE_PATTERNS=*.tmp,*.bak,*.swp

# Include patterns: if non-empty, only matching files are considered (allowlist).
# Each comma-separated entry becomes a separate pattern. Equivalent to
# repeating --include / -i on the CLI.
# INCLUDE_PATTERNS=*.txt,*.md
